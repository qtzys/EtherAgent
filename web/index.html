<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>核心 Agent v0 · WorkBuddy 风格</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ============ 顶部栏 ============ -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">🧠</span>
      <span class="brand">核心Agent</span>
      <span class="status-dot"></span>
      <span class="status-text" id="statusText">就绪</span>
      <span class="status-sep">·</span>
      <span class="step-info" id="stepInfo">第 1 步</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btnInfo" title="Agent 信息">ⓘ</button>
      <button class="icon-btn" id="btnSettings" title="设置">⋮</button>
    </div>
  </header>

  <!-- ============ 主体 ============ -->
  <div class="main">

    <!-- ============ 左栏：任务列表 ============ -->
    <aside class="sidebar">
      <button class="new-task-btn" id="btnNewTask">
        <span class="plus">+</span>
        <span>新建任务</span>
      </button>

      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-title">任务</span>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="clear-all-btn" id="btnClearAll" title="清空所有任务">清空</button>
            <span class="section-count" id="taskCount">0 任务</span>
          </div>
        </div>
        <ul class="task-list" id="taskList">
          <!-- 动态填充 -->
          <li class="task-item empty">暂无任务，点击上方按钮创建</li>
        </ul>
      </div>
    </aside>

    <!-- ============ 主聊天区 ============ -->
    <main class="chat-area">

      <div class="chat-scroll" id="chatScroll">
        <!-- 欢迎屏 -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🧠</div>
          <h1>最核心 Agent v0</h1>
          <p class="welcome-sub">已激活 6 项核心能力</p>
          <div class="cap-grid">
            <div class="cap-card"><span class="cap-dot" style="background:#4ade80"></span>感知</div>
            <div class="cap-card"><span class="cap-dot" style="background:#60a5fa"></span>思考</div>
            <div class="cap-card"><span class="cap-dot" style="background:#fbbf24"></span>记忆</div>
            <div class="cap-card"><span class="cap-dot" style="background:#fb923c"></span>行动</div>
            <div class="cap-card"><span class="cap-dot" style="background:#c084fc"></span>表达</div>
            <div class="cap-card"><span class="cap-dot" style="background:#f87171"></span>协作</div>
          </div>
          <p class="welcome-tip">试试输入：<code>搜索 腾讯 workbuddy</code> 或 <code>读取 01-设计\02-论文基线.md</code></p>
        </div>
      </div>

      <!-- ============ 输入区 ============ -->
      <div class="input-area">
        <div class="input-box">
          <button class="input-action" title="提及">@</button>
          <textarea
            id="msgInput"
            placeholder="发消息给 Agent..."
            rows="1"
          ></textarea>
          <button class="input-action" title="语音（v0 未实现）">🎤</button>
          <button class="send-btn" id="btnSend" title="发送">
            <span>→</span>
          </button>
        </div>
        <div class="input-hint">按 Enter 发送 · Shift+Enter 换行</div>
      </div>

    </main>

  </div>

  <!-- ============ Agent 信息弹窗 ============ -->
  <div class="modal" id="infoModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Agent 信息</h2>
        <button class="modal-close" id="infoClose">×</button>
      </div>
      <div class="modal-body" id="infoBody">加载中...</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
